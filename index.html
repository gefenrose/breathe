<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>נשימה</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5ec3be">

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="נשימה">
  <link rel="apple-touch-icon" href="icon-180.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      width: 100%; height: 100%;
    }

    body {
      background: #eef6f6;
      background: radial-gradient(ellipse at 50% 35%, #dff2f1 0%, #eef6f6 65%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      color: #3d9090;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 32px 24px;
    }

    /* ─── Header ─── */
    .header {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 1px;
      color: #5ec3be;
    }

    /* ─── Visualisation ─── */
    .vis {
      position: relative;
      width: 288px;
      height: 288px;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .ring-bg {
      fill: none;
      stroke: #cce8e7;
      stroke-width: 2;
    }

    .ring-fill {
      fill: none;
      stroke: #5ec3be;
      stroke-width: 2.5;
      stroke-linecap: round;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .ring-fill.visible {
      opacity: 1;
    }

    .flower-area {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flower {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .petal {
      position: absolute;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: rgba(94, 196, 192, 0.50);
      top: 50%;
      left: 50%;
      margin: -33px 0 0 -33px;
      will-change: transform;
    }

    .core {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(100, 212, 208, 0.90);
      top: 50%;
      left: 50%;
      margin: -24px 0 0 -24px;
      pointer-events: none;
      will-change: transform;
    }

    /* ─── Phase label ─── */
    .phase {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: #3d9090;
      min-height: 30px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .phase.fade {
      opacity: 0;
    }

    /* ─── Grounding message ─── */
    .grounding {
      font-size: 14px;
      font-weight: 300;
      color: #7ababa;
      min-height: 20px;
      text-align: center;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.9s ease;
      padding: 0 16px;
    }

    .grounding.visible {
      opacity: 1;
    }

    /* ─── Info line ─── */
    .info {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2px;
      color: #9fcece;
      min-height: 17px;
      text-align: center;
    }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    /* Shared pill-row style */
    .pill-row {
      display: flex;
      gap: 6px;
      transition: opacity 0.3s ease;
    }

    .pill-row.locked {
      opacity: 0.35;
      pointer-events: none;
    }

    /* Exercise type pills */
    .exer {
      font-family: inherit;
      font-size: 12px;
      background: none;
      border: 1px solid #c2e2e1;
      color: #89c0bf;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      outline: none;
      white-space: nowrap;
    }

    .exer:hover:not(.on) {
      border-color: #5ec3be;
      color: #5ec3be;
    }

    .exer.on {
      background: #5ec3be;
      border-color: #5ec3be;
      color: #fff;
    }

    /* Exercise description */
    .exer-desc {
      font-size: 11px;
      color: #b0d8d8;
      min-height: 16px;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    /* Divider */
    .sep {
      width: 200px;
      height: 1px;
      background: #ddf0ef;
      margin: 2px 0;
    }

    /* Breath-count pills */
    .dur {
      font-family: inherit;
      font-size: 12px;
      background: none;
      border: 1px solid #c2e2e1;
      color: #89c0bf;
      padding: 7px 17px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      outline: none;
    }

    .dur:hover:not(.on) {
      border-color: #5ec3be;
      color: #5ec3be;
    }

    .dur.on {
      background: #5ec3be;
      border-color: #5ec3be;
      color: #fff;
    }

    .action {
      font-family: inherit;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.5px;
      background: none;
      border: 1.5px solid #5ec3be;
      color: #5ec3be;
      padding: 12px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, transform 0.1s;
      outline: none;
      min-width: 160px;
      margin-top: 4px;
    }

    .action:hover {
      background: #5ec3be;
      color: #fff;
    }

    .action:active {
      transform: scale(0.96);
    }

    /* ─── Idle pulse ─── */
    @keyframes idlePulse {
      0%, 100% { transform: scale(0.78); }
      50%       { transform: scale(0.88); }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">נשימה</div>

  <div class="vis">
    <svg class="ring-svg" width="288" height="288">
      <circle class="ring-bg"   cx="144" cy="144" r="131"/>
      <circle class="ring-fill" cx="144" cy="144" r="131" id="ring"/>
    </svg>
    <div class="flower-area">
      <div class="flower" id="flower">
        <div class="petal" id="p0"></div>
        <div class="petal" id="p1"></div>
        <div class="petal" id="p2"></div>
        <div class="petal" id="p3"></div>
        <div class="petal" id="p4"></div>
        <div class="petal" id="p5"></div>
        <div class="core"></div>
      </div>
    </div>
  </div>

  <div class="phase"     id="phase">&nbsp;</div>
  <div class="grounding" id="grounding"></div>
  <div class="info"      id="info"></div>

  <div class="controls">

    <!-- Exercise type -->
    <div class="pill-row" id="exers">
      <button class="exer on" data-id="balanced">מאוזנת</button>
      <button class="exer"    data-id="box">קופסה</button>
      <button class="exer"    data-id="478">4-7-8</button>
      <button class="exer"    data-id="calm">רגועה</button>
    </div>
    <div class="exer-desc" id="exerDesc"></div>

    <div class="sep"></div>

    <!-- Breath count -->
    <div class="pill-row" id="durs">
      <button class="dur"    data-n="5">5 נשימות</button>
      <button class="dur on" data-n="7">7 נשימות</button>
      <button class="dur"    data-n="10">10 נשימות</button>
    </div>

    <button class="action" id="action">התחל</button>
  </div>

</div>

<script>
(() => {
  /* ── Exercise definitions ── */
  const EXERCISES = {
    balanced: {
      name: 'מאוזנת',
      desc: 'נשימה בסיסית ומרגיעה · 4 · 4 שנ׳',
      inhale: 4000, hold1: 750, exhale: 4000, hold2: 750,
    },
    box: {
      name: 'קופסה',
      desc: 'להפגת לחץ וחרדה · 4 · 4 · 4 · 4 שנ׳',
      inhale: 4000, hold1: 4000, exhale: 4000, hold2: 4000,
    },
    '478': {
      name: '4-7-8',
      desc: 'הרפיה עמוקה לפני שינה · 4 · 7 · 8 שנ׳',
      inhale: 4000, hold1: 7000, exhale: 8000, hold2: 0,
    },
    calm: {
      name: 'רגועה',
      desc: 'איזון קצב לב · 5 · 5 שנ׳',
      inhale: 5000, hold1: 0, exhale: 5000, hold2: 0,
    },
  };

  const REST = 500; // ms between cycles (not included in ring timer)

  /* ── Grounding messages shown during exhale ── */
  const GROUNDING = [
    'שחרר את הכתפיים',
    'הרגש את הרצפה מתחת לרגליך',
    'שים לב לאוויר על עורך',
    'אתה כאן, עכשיו',
    'הרגש את החזה שלך עולה ויורד',
    'שחרר את הלחץ מהלסת',
    'תן למחשבות לעבור בשקט',
  ];

  /* ── Constants ── */
  const N      = 6;
  const SPREAD = 48;
  const R      = 131;
  const C      = 2 * Math.PI * R;

  /* ── Elements ── */
  const flowerEl    = document.getElementById('flower');
  const petals      = [...Array(N)].map((_, i) => document.getElementById('p' + i));
  const phaseEl     = document.getElementById('phase');
  const groundingEl = document.getElementById('grounding');
  const infoEl      = document.getElementById('info');
  const exerDescEl  = document.getElementById('exerDesc');
  const actionBtn   = document.getElementById('action');
  const ringEl      = document.getElementById('ring');
  const exersEl     = document.getElementById('exers');
  const dursEl      = document.getElementById('durs');
  const exerBtns    = [...document.querySelectorAll('.exer')];
  const durBtns     = [...document.querySelectorAll('.dur')];

  /* ── State ── */
  let exercise     = EXERCISES.balanced;
  let totalBreaths = 7;
  let isRunning    = false;
  let stopped      = false;
  let wakeUp       = null;
  let rafId        = null;
  let groundingTimer = null;

  /* ── Ring setup ── */
  ringEl.style.strokeDasharray  = C;
  ringEl.style.strokeDashoffset = C;

  /* ── Petal vectors (top → clockwise) ── */
  const vecs = petals.map((_, i) => {
    const a = (i * 60 - 90) * Math.PI / 180;
    return [Math.cos(a) * SPREAD, Math.sin(a) * SPREAD];
  });

  /* ── Helpers ── */

  function sleep(ms) {
    return new Promise(resolve => {
      const id = setTimeout(() => { wakeUp = null; resolve(); }, ms);
      wakeUp = () => { clearTimeout(id); wakeUp = null; resolve(); };
    });
  }

  function interrupt() {
    stopped = true;
    if (wakeUp) wakeUp();
  }

  function setPhase(txt) {
    phaseEl.classList.add('fade');
    setTimeout(() => {
      phaseEl.textContent = txt || ' ';
      phaseEl.classList.remove('fade');
    }, 200);
  }

  function showGrounding(idx) {
    clearTimeout(groundingTimer);
    groundingTimer = setTimeout(() => {
      if (!stopped) {
        groundingEl.textContent = GROUNDING[idx % GROUNDING.length];
        groundingEl.classList.add('visible');
      }
    }, 700);
  }

  function clearGrounding() {
    clearTimeout(groundingTimer);
    groundingEl.classList.remove('visible');
  }

  function fmtTime(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m === 0) return `${s} שנ׳`;
    if (sec === 0) return `${m} דק׳`;
    return `${m}:${String(sec).padStart(2, '0')} דק׳`;
  }

  function updateInfo() {
    const ex = exercise;
    const total = (ex.inhale + ex.hold1 + ex.exhale + ex.hold2) * totalBreaths;
    infoEl.textContent = `${totalBreaths} נשימות · ${fmtTime(total)}`;
  }

  function initPetals() {
    petals.forEach(p => {
      p.style.transition = 'none';
      p.style.transform  = 'translate(0,0)';
    });
    flowerEl.style.transition = 'none';
    flowerEl.style.transform  = 'scale(0.78)';
  }

  function setExpanded(expand, ms) {
    const ease = 'cubic-bezier(0.45, 0.05, 0.55, 0.95)';
    flowerEl.style.transition = `transform ${ms}ms ${ease}`;
    flowerEl.style.transform  = `scale(${expand ? 1.42 : 0.78})`;
    petals.forEach((p, i) => {
      p.style.transition = `transform ${ms}ms ${ease}`;
      p.style.transform  = expand
        ? `translate(${vecs[i][0]}px,${vecs[i][1]}px)`
        : 'translate(0,0)';
    });
  }

  function startRing(totalMs) {
    const t0 = performance.now();
    ringEl.classList.add('visible');
    const tick = now => {
      if (!isRunning) return;
      const p = Math.min((now - t0) / totalMs, 1);
      ringEl.style.strokeDashoffset = C * (1 - p);
      if (p < 1) rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }

  function stopRing() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    ringEl.classList.remove('visible');
    ringEl.style.strokeDashoffset = C;
  }

  function startIdle() {
    flowerEl.style.transition = 'none';
    flowerEl.style.transform  = '';
    flowerEl.style.animation  = 'idlePulse 3.2s ease-in-out infinite';
  }

  function stopIdle() {
    flowerEl.style.animation = 'none';
  }

  /* ── Haptic feedback (Vibration API — Android/Chrome; no-op elsewhere) ── */
  const canVibrate = 'vibrate' in navigator;
  function haptic(pattern) {
    if (canVibrate) navigator.vibrate(pattern);
  }

  function lockControls(lock) {
    exersEl.classList.toggle('locked', lock);
    dursEl.classList.toggle('locked', lock);
  }

  function resetUI() {
    actionBtn.textContent = 'התחל';
    lockControls(false);
    updateInfo();
    setPhase('');
    clearGrounding();
    stopRing();
  }

  /* ── Main session loop ── */
  async function runSession() {
    const ex = exercise;
    stopIdle();
    initPetals();
    await sleep(200);

    const cycleMs = ex.inhale + ex.hold1 + ex.exhale + ex.hold2;
    startRing(cycleMs * totalBreaths);

    for (let i = 0; i < totalBreaths; i++) {
      if (stopped) break;

      const left = totalBreaths - i;
      infoEl.textContent = left === 1 ? 'נשימה אחת נותרת' : `נותרות ${left} נשימות`;

      // Inhale
      haptic(20);
      setPhase('שאיפה');
      setExpanded(true, ex.inhale);
      await sleep(ex.inhale);
      if (stopped) break;

      // Hold 1 (after inhale)
      if (ex.hold1 > 0) {
        haptic([15, 60, 15]);
        setPhase('החזק');
        await sleep(ex.hold1);
        if (stopped) break;
      }

      // Exhale — grounding message fades in 700ms after exhale starts
      haptic(20);
      setPhase('נשיפה');
      showGrounding(i);
      setExpanded(false, ex.exhale);
      await sleep(ex.exhale);
      if (stopped) break;

      // Hold 2 (after exhale — keep grounding visible)
      if (ex.hold2 > 0) {
        haptic([15, 60, 15]);
        setPhase('החזק');
        await sleep(ex.hold2);
        if (stopped) break;
      }

      // Brief rest between cycles
      setPhase('');
      clearGrounding();
      if (i < totalBreaths - 1) await sleep(REST);
    }

    stopRing();

    if (!stopped) {
      haptic([30, 80, 30, 80, 60]);
      clearGrounding();
      setPhase('סיום');
      infoEl.textContent = 'הסשן הסתיים';
      ringEl.classList.add('visible');
      ringEl.style.strokeDashoffset = 0;
      await sleep(2400);
      ringEl.classList.remove('visible');
    }

    isRunning = false;
    stopped   = false;
    resetUI();

    setExpanded(false, 900);
    await sleep(900);
    startIdle();
  }

  /* ── Button handlers ── */

  actionBtn.addEventListener('click', () => {
    if (isRunning) {
      interrupt();
      isRunning = false;
      resetUI();
    } else {
      isRunning = true;
      stopped   = false;
      actionBtn.textContent = 'עצור';
      lockControls(true);
      runSession();
    }
  });

  exerBtns.forEach(b => b.addEventListener('click', () => {
    exerBtns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    exercise = EXERCISES[b.dataset.id];
    exerDescEl.textContent = exercise.desc;
    updateInfo();
  }));

  durBtns.forEach(b => b.addEventListener('click', () => {
    durBtns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    totalBreaths = parseInt(b.dataset.n, 10);
    updateInfo();
  }));

  /* ── Init ── */
  ringEl.style.strokeDashoffset = C;
  exerDescEl.textContent = exercise.desc;
  updateInfo();
  startIdle();

  /* ── Service worker ── */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

})();
</script>
</body>
</html>
